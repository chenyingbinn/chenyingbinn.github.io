<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found | Yingbin Chen</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111d;
        --panel: rgba(15, 37, 51, 0.76);
        --line: rgba(103, 232, 249, 0.28);
        --text: #f8fafc;
        --muted: #b7cad6;
        --accent: #67e8f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 74% 22%, rgba(21, 94, 117, 0.58), transparent 36%),
          linear-gradient(135deg, #07111d 0%, #0f2533 56%, #07111d 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(620px, 100%);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        padding: 42px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      svg {
        width: 62px;
        height: 62px;
        margin-bottom: 26px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.3rem, 8vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        border: 1px solid rgba(103, 232, 249, 0.38);
        border-radius: 999px;
        padding: 0 18px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      a:focus-visible {
        outline: 3px solid rgba(103, 232, 249, 0.52);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <rect x="4" y="4" width="56" height="56" rx="15" fill="#0f2533" />
        <path d="M15 43 L28 31 L38 36 L50 20" fill="none" stroke="#67e8f9" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="15" cy="43" r="4.1" fill="#0f766e" />
        <circle cx="28" cy="31" r="4.4" fill="#07111d" stroke="#67e8f9" stroke-width="1.8" />
        <circle cx="38" cy="36" r="3.6" fill="#07111d" stroke="#67e8f9" stroke-width="1.35" />
        <circle cx="50" cy="20" r="5.4" fill="#67e8f9" />
      </svg>
      <h1>Page not found</h1>
      <p>The page you are looking for does not exist.</p>
      <a href="https://chenyingbinn.github.io/">Back to homepage</a>
    </main>
  </body>
</html>
